        ${NBW_PANTRY}/shelves/roman-22.0.0/data/pandeia_data-2026.1-roman
      PSF_DIR: ${NBW_PANTRY}/shelves/roman-22.0.0/data/pandeia_psf-2026.1-roman
      STPSF_PATH: ${NBW_PANTRY}/shelves/roman-22.0.0/data/stpsf-data
      stips_data: ${NBW_PANTRY}/shelves/roman-22.0.0/data/stips_data
      PYSYN_CDBS: ${NBW_PANTRY}/shelves/roman-22.0.0/data/grp/redcat/trds
      CRDS_SERVER_URL: https://roman-crds.stsci.edu
      CRDS_CONTEXT: roman_0041.pmap
      CRDS_PATH: ${HOME}/crds_cache
