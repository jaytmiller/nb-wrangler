# Image header information
image_spec_header:
  image_name: jwebbinar-49
  deployment_name: wrangler
  kernel_name: jwebbinar-49
  display_name: JWebbinar 49
  description: |
    This spec is for the production version of jwebbinar-49
  valid_on: 2026-06-01
  expires_on: 2026-12-01
  python_version: 3.12

repositories:
  jwebbinar_prep:
    url: https://github.com/spacetelescope/jwebbinar_prep.git
    ref: main

selected_notebooks:
  jwebbinar_all:
    repo: jwebbinar_prep
    root_directory: jwebbinar49
    include_subdirs:
      - '.*'

system:
  spec_version: 2.1
  archive_format: .tar
  primary_repo: spacetelescope/jwebbinar_prep
  nb-wrangler:
    repo: https://github.com/spacetelescope/nb-wrangler.git
    ref: main
  spi:
    repo: https://github.com/spacetelescope/science-platform-images.git
    ref: main
  date_updated: '2026-06-24T15:12:21.504595'
  spec_sha256: ca8be96be03cce0332824c8d30246bf1fe4342886fe6800daa24fc90fbeca21e

dev_overrides:
  system:
    primary_repo: jaytmiller/roman_notebooks
    nb-wrangler:
      repo: https://github.com/jaytmiller/nb-wrangler.git
      ref: dev
    spi:
      repo: https://github.com/jaytmiller/science-platform-images.git
      ref: dev
  # --- repositories:
  # ---   jwebbinar_prep:
  # ---     url: https://github.com/jaytmiller/jwebbinar_prep.git
  # ---     ref: abstract-data-paths

extra_mamba_packages: []

# To add as many packages as possible from PyPi
extra_pip_packages: []

# These supersede all conflicting constraints
override_pip_versions: []

refdata_dependencies:
  install_files:
    jwebbinar_49:
      version: 1.0.0
      data_url:
        - https://stsci.box.com/shared/static/ne5lhejqsg8lzakb3djde3n4cm9u6yww.gz
      environment_variable: JWEBBINAR_49_DATA
      install_path: $HOME/references/jwebbinar_prep/data
      data_path: .
  other_variables:
    CRDS_SERVER_URL: https://jwst-crds.stsci.edu
    CRDS_PATH: $HOME/crds_cache
    JWEBBINAR_49_OUT: $HOME/references/jwebbinar_prep/outputs
    # CRDS_CONTEXT:

# To add mamba packages to the basic mission environment, ideally minimize

out:
  data:
    spec_inputs:
      /home/ai/references/jwebbinar_prep/refdata_dependencies.yaml:
        install_files: {}
        other_variables: {}
      /home/ai/references/nbw-spec/refdata_dependencies.yaml:
        install_files:
          jwebbinar_49:
            version: 1.0.0
            environment_variable: JWEBBINAR_49_DATA
            install_path: $HOME/references/jwebbinar_prep/data
            data_path: .
            data_url:
              - https://stsci.box.com/shared/static/ne5lhejqsg8lzakb3djde3n4cm9u6yww.gz
        other_variables:
          CRDS_SERVER_URL: https://jwst-crds.stsci.edu
          CRDS_PATH: $HOME/crds_cache
          JWEBBINAR_49_OUT: $HOME/references/jwebbinar_prep/outputs
    spec_exports:
      JWEBBINAR_49_DATA: $HOME/references/jwebbinar_prep/data/.
      CRDS_SERVER_URL: https://jwst-crds.stsci.edu
      CRDS_PATH: $HOME/crds_cache
      JWEBBINAR_49_OUT: $HOME/references/jwebbinar_prep/outputs
    pantry_exports:
      JWEBBINAR_49_DATA: ${NBW_PANTRY}/shelves/jwebbinar-49/data
      CRDS_SERVER_URL: https://jwst-crds.stsci.edu
      CRDS_PATH: $HOME/crds_cache
      JWEBBINAR_49_OUT: $HOME/references/jwebbinar_prep/outputs
