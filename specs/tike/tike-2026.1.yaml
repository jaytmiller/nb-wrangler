# these are the useful tike_content notebooks

repositories:
  tike_content:
    url: https://github.com/spacetelescope/tike_content
    ref: main
  mast_notebooks:
    url: https://github.com/spacetelescope/mast_notebooks
    ref: main

selected_notebooks:
  tike_notebook_selection:
    repo: tike_content
    root_directory: content/notebooks/
    include_subdirs:
      - data-access/
      - lcviz-tutorial/
      - tglc/
      - zooniverse_view_lightcurve/
  mast_tess_kepler_selection:
    repo: mast_notebooks
    root_directory: notebooks/
    include_subdirs:
      - TESS/beginner_how_to_use_lc
      - TESS/beginner_tour_lc_tp
      - Kepler/identifying_transiting_planet_signals
      - Kepler/instrumental_noise_4_electronic_noise

extra_mamba_packages:
  - pip
extra_pip_packages:
  - boto3

system:
  spec_version: 2.2
  archive_format: .tar
  primary_repo: spacetelescope/roman_notebooks
  nb-wrangler:
    repo: https://github.com/spacetelescope/nb-wrangler.git
    ref: main
  spi:
