  image_name: RomanJdavizTesting-2026.1
  deployment_name: roman   # non-wrangler requires updating SPI kernel name
  kernel_name: JDavizTesting-2026.1
  display_name: JDaviz Testing 2026.1
  description: |
    This spec is to support JDaviz testing on RRN for JUSI-2649

  valid_on: 2026-05-22
  expires_on: 2026-11-22
  python_version: 3.12

repositories:
  roman_notebooks:
    url: https://github.com/spacetelescope/roman_notebooks.git
    ref: main

system:
  spec_version: 2.1
  archive_format: .tar
  primary_repo: spacetelescope/roman_notebooks
  nb-wrangler:
    repo: https://github.com/spacetelescope/nb-wrangler.git
    ref: main
  spi:
    repo: https://github.com/spacetelescope/science-platform-images.git
    ref: main
  date_updated: '2026-05-20T07:57:50.376460'
  spec_sha256: b94c6341c500dbd90623ba29944310a1d4f369a75919b5585bdf4f6ac64ef0ae

selected_notebooks:
  roman_all:
    repo: roman_notebooks
    root_directory: notebooks/
    include_subdirs:
      - omit-all-notebooks-to-avoid-constraint-pinning

apt_packages:
  - libgl1-mesa-dev
