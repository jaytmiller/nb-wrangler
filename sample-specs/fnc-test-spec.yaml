# Image header information
image_spec_header:
  image_name: TIKE 2025.07-beta
  deployment_name: tike
  kernel_name: tess
  display_name: TESS
  description: |
    This is a beta test of the latest TIKE packages. Use at your own risk!
  valid_on: 2025-07-02
  expires_on: 2025-10-02
  python_version: 3.11.13

repositories:
  tike_content:
    url: https://github.com/spacetelescope/tike_content
    ref: main
  mast_notebooks:
    url: https://github.com/spacetelescope/mast_notebooks
    ref: main

selected_notebooks:
  tike_lcviz_tutorial:
    repo: tike_content
    root_directory: content/notebooks/lcviz-tutorial/
    include_subdirs:
      - .
    tests:
      papermill: false
  tike_data_access:
    repo: tike_content
    root_directory: content/notebooks/data-access/
    include_subdirs:
      - .
    tests:
      playwright: test_data_access.py
  tike_tglc:
    repo: tike_content
    root_directory: content/notebooks/tglc/
    include_subdirs:
      - .
  tike_zooniverse:
    repo: tike_content
    root_directory: content/notebooks/zooniverse_view_lightcurve/
    include_subdirs:
      - .
  mast_tess_beginner:
    repo: mast_notebooks
    root_directory: notebooks/TESS
    include_subdirs:
      - beginner_how_to_use_lc
      - beginner_tour_lc_tp
  mast_kepler_identifying:
    repo: mast_notebooks
    root_directory: notebooks/Kepler
    include_subdirs:
      - identifying_transiting_planet_signals
      - instrumental_noise_4_electronic_noise

extra_mamba_packages:
  - pip
extra_pip_packages:
  - boto3

